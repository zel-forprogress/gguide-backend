spring:
  application:
    name: gguide
  #热加载
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
    livereload:
      enabled: true
  mongodb:
    uri: mongodb+srv://${env.MONGO_USERNAME}:${env.MONGO_PASSWORD}@${env.MONGO_CLUSTER}/${env.MONGO_DATABASE}

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    person.hardy.gguide: DEBUG