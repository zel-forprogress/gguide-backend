spring:
  application:
    name: gguide
  output:
    ansi:
      enabled: ALWAYS
  mongodb:
    uri: mongodb+srv://${env.MONGO_USERNAME}:${env.MONGO_PASSWORD}@${env.MONGO_CLUSTER}/${env.MONGO_DATABASE}?retryWrites=true&w=majority

jwt:
  secret: ${env.JWT_SECRET}
  expiration-ms: ${env.JWT_EXPIRATION_MS:86400000}

ai:
  api:
    key: ${env.AI_API_KEY:}
    url: ${env.AI_API_URL:}
  model: ${env.AI_MODEL:}

app:
  cors:
    allowed-origins: ${env.CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  admin:
    usernames: ${env.ADMIN_USERNAMES:admin}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    person.hardy.gguide: INFO
